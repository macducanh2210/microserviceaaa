<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTTMart Admin Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --card: #ffffff;
            --line: #e5eaf2;
            --text: #1e293b;
            --muted: #65758b;
            --deep: #1b2440;
            --deep-2: #222f56;
            --ok: #0f9d58;
            --danger: #dc2626;
        }

        body {
            margin: 0;
            font-family: 'Be Vietnam Pro', sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #eef2f9 0%, #f8fafc 100%);
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: linear-gradient(165deg, var(--deep) 0%, var(--deep-2) 100%);
            color: #d9e2f2;
            padding: 20px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .brand i {
            font-size: 1.45rem;
            color: #7a8cff;
        }

        .role-badge {
            margin-top: 8px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            padding: 7px 12px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.85rem;
        }

        .menu-label {
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #8ca1c5;
            margin: 12px 10px 8px;
        }

        .menu-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #d9e2f2;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            overflow: hidden;
            transform: translateX(0);
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: #8aa3ff;
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.2s ease;
        }

        .menu-item:hover,
        .menu-item.active {
            border-color: rgba(122, 140, 255, 0.45);
            background: rgba(122, 140, 255, 0.18);
            color: #fff;
            transform: translateX(3px);
        }

        .menu-item:hover::before,
        .menu-item.active::before {
            transform: scaleY(1);
        }

        .menu-item span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
        }

        .menu-right {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
        }

        .content {
            padding: 14px;
        }

        .topbar {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .search-wrap {
            width: 100%;
            max-width: 460px;
            display: flex;
            align-items: center;
            gap: 9px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 11px;
            color: var(--muted);
        }

        .search-wrap input {
            border: 0;
            outline: none;
            width: 100%;
            font-size: 0.92rem;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-soft {
            border: 1px solid var(--line);
            background: white;
            border-radius: 10px;
            padding: 7px 10px;
            font-weight: 600;
            color: var(--text);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #d4dffb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #1f2a48;
        }

        .cardx {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .toolbar select,
        .toolbar input {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 0.9rem;
            background: #fff;
        }

        .table-wrap {
            max-height: 560px;
            overflow: auto;
        }

        .status-active,
        .status-canceled {
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 0.78rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-active {
            color: var(--ok);
            background: #e8f8ef;
        }

        .status-canceled {
            color: var(--danger);
            background: #ffebee;
        }

        .small-muted {
            font-size: 0.82rem;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand"><i class="fa-solid fa-box-open"></i><span>UTTMart</span></div>
            <div class="role-badge" id="roleBadge"><i class="fa-solid fa-shield-halved"></i><span>Dang xac thuc...</span></div>

            <div class="menu-label">MENU</div>
            <a class="menu-item" href="/manage.html">
                <span><i class="fa-solid fa-table-columns"></i>Dashboard</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item" href="/suppliers.html">
                <span><i class="fa-solid fa-truck-field"></i>Suppliers</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item" href="/products.html">
                <span><i class="fa-solid fa-tags"></i>Products</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item" href="/employees.html">
                <span><i class="fa-solid fa-user-gear"></i>Employees</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item" href="/admin-import.html">
                <span><i class="fa-solid fa-file-import"></i>Import</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item active" href="/admin-orders.html">
                <span><i class="fa-solid fa-box-open"></i>Orders</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item" href="/">
                <span><i class="fa-solid fa-store"></i>Shop</span>
                <span class="menu-right"></span>
            </a>
            <a class="menu-item" href="/attendance.html">
                <span><i class="fa-solid fa-user-check"></i>Cham cong</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a class="menu-item" href="/expenses.html">
                <span><i class="fa-solid fa-wallet"></i>Chi tieu</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

            <div class="menu-label">SUPPORT</div>
            <button class="menu-item" id="logoutBtn">
                <span><i class="fa-solid fa-right-from-bracket"></i>Logout</span>
                <span class="menu-right"><i class="fa-solid fa-chevron-right"></i></span>
            </button>
        </aside>

        <main class="content">
            <div class="topbar">
                <div class="search-wrap">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="searchInput" type="text" placeholder="Tim theo ma don, ma khach hang...">
                </div>
                <div class="top-actions">
                    <button class="btn-soft" id="refreshBtn"><i class="fa-solid fa-rotate"></i></button>
                    <div class="small-muted" id="welcomeText">Dang kiem tra quyen...</div>
                    <div class="avatar" id="avatarText">U</div>
                </div>
            </div>

            <section class="cardx">
                <div class="card-title">Toan bo don hang</div>
                <div class="toolbar">
                    <select id="statusFilter">
                        <option value="all">Tat ca trang thai</option>
                        <option value="active">Dang hoat dong</option>
                        <option value="canceled">Da huy</option>
                    </select>
                    <select id="customerFilter">
                        <option value="all">Tat ca khach hang</option>
                    </select>
                </div>
                <div class="table-wrap">
                    <table class="table table-sm align-middle">
                        <thead>
                            <tr>
                                <th>Ma don</th>
                                <th>Ma khach</th>
                                <th>Ngay tao</th>
                                <th>So dong</th>
                                <th>Tong tien</th>
                                <th>Trang thai</th>
                                <th>Thao tac</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Chi tiet don hang</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="orderDetailBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const ORDER_API_BASE = '/api/orders';

        let allOrders = [];
        let currentUserId = 0;

        function formatCurrency(value) {
            return Number(value || 0).toLocaleString('vi-VN') + ' đ';
        }

        function logout() {
            localStorage.removeItem('polymart_user');
            localStorage.removeItem('fashion_user_id');
            window.location.href = '/login.html';
        }

        async function fetchJson(url, method = 'GET', payload = null) {
            const options = { method, headers: { 'Accept': 'application/json' } };
            if (payload) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(payload);
            }

            const res = await fetch(url, options);
            const text = await res.text();
            const json = JSON.parse(text);
            if (!res.ok || json.success !== true) {
                throw new Error(json.message || ('HTTP ' + res.status));
            }
            return json.data;
        }

        function fillCustomerFilter(orders) {
            const select = document.getElementById('customerFilter');
            const current = select.value || 'all';
            const customers = [...new Set((orders || []).map((o) => Number(o.customer_id || 0)).filter((v) => v > 0))].sort((a, b) => a - b);
            select.innerHTML = '<option value="all">Tat ca khach hang</option>' + customers.map((id) => `<option value="${id}">Khach #${id}</option>`).join('');
            if ([...select.options].some((o) => o.value === current)) {
                select.value = current;
            }
        }

        function renderOrdersTable() {
            const keyword = String(document.getElementById('searchInput').value || '').trim().toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const customer = document.getElementById('customerFilter').value;

            const filtered = allOrders.filter((order) => {
                const active = Boolean(order.active);
                if (status === 'active' && !active) return false;
                if (status === 'canceled' && active) return false;
                if (customer !== 'all' && String(order.customer_id || '') !== customer) return false;
                if (!keyword) return true;
                const text = `${order.order_id} ${order.customer_id || ''}`.toLowerCase();
                return text.includes(keyword);
            });

            const body = document.getElementById('ordersBody');
            if (!filtered.length) {
                body.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Khong co du lieu phu hop</td></tr>';
                return;
            }

            body.innerHTML = filtered.map((order) => {
                const active = Boolean(order.active);
                const actionButtons = [
                    `<button class="btn btn-sm btn-outline-dark" onclick="viewDetail(${order.order_id})">Chi tiet</button>`,
                    active ? `<button class="btn btn-sm btn-outline-danger" onclick="cancelOrder(${order.order_id})">Huy don</button>` : '',
                ].join(' ');

                return `
                    <tr>
                        <td class="fw-semibold">#${order.order_id}</td>
                        <td>${order.customer_id || '-'}</td>
                        <td>${order.order_date || '-'}</td>
                        <td>${Number(order.item_count || 0)}</td>
                        <td class="text-danger fw-semibold">${formatCurrency(order.total_amount)}</td>
                        <td><span class="${active ? 'status-active' : 'status-canceled'}">${active ? 'Dang hoat dong' : 'Da huy'}</span></td>
                        <td>${actionButtons}</td>
                    </tr>
                `;
            }).join('');
        }

        async function loadOrders() {
            const [orders] = await Promise.all([
                fetchJson(`${ORDER_API_BASE}/list.php?user_id=${currentUserId}`),
            ]);

            allOrders = Array.isArray(orders) ? orders : [];
            fillCustomerFilter(allOrders);
            renderOrdersTable();
        }

        async function viewDetail(orderId) {
            try {
                const data = await fetchJson(`${ORDER_API_BASE}/detail.php?user_id=${currentUserId}&order_id=${orderId}`);
                const order = data;
                const html = `
                    <div class="mb-3">
                        <div><strong>Ma don:</strong> #${order.order_id}</div>
                        <div><strong>Ngay:</strong> ${order.order_date || '-'}</div>
                        <div><strong>Trang thai:</strong> ${order.active ? 'Dang hoat dong' : 'Da huy'}</div>
                        <div><strong>Khach hang:</strong> #${order.customer_id || '-'}</div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>Detail ID</th>
                                    <th>San pham</th>
                                    <th>So luong</th>
                                    <th>Don gia</th>
                                    <th>Thanh tien</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(order.items || []).map((it) => `
                                    <tr>
                                        <td>${it.detail_id}</td>
                                        <td>#${it.product_id || '-'}</td>
                                        <td>${it.quantity}</td>
                                        <td>${formatCurrency(it.unit_price)}</td>
                                        <td class="text-danger fw-semibold">${formatCurrency(it.line_total)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div class="text-end fw-bold">Tong cong: <span class="text-danger">${formatCurrency(order.total_amount)}</span></div>
                `;

                document.getElementById('orderDetailBody').innerHTML = html;
                new bootstrap.Modal(document.getElementById('detailModal')).show();
            } catch (err) {
                alert('Khong lay duoc chi tiet don: ' + err.message);
            }
        }

        async function cancelOrder(orderId) {
            if (!confirm('Ban chac chan muon huy don nay?')) {
                return;
            }

            try {
                await fetchJson(`${ORDER_API_BASE}/delete.php`, 'POST', {
                    user_id: currentUserId,
                    order_id: orderId,
                });
                alert('Huy don thanh cong.');
                await loadOrders();
            } catch (err) {
                alert('Huy don that bai: ' + err.message);
            }
        }

        (function boot() {
            const userRaw = localStorage.getItem('polymart_user');
            if (!userRaw) {
                window.location.href = '/login.html';
                return;
            }

            let user = null;
            try {
                user = JSON.parse(userRaw);
            } catch (e) {
                logout();
                return;
            }

            const role = String(user.ROLE || '').toLowerCase();
            if (role !== 'admin' && role !== 'staff') {
                window.location.href = '/orders.html';
                return;
            }

            currentUserId = Number(user.ID || localStorage.getItem('fashion_user_id') || 0);
            if (!Number.isInteger(currentUserId) || currentUserId <= 0) {
                logout();
                return;
            }

            const roleLabel = role === 'admin' ? 'Quan tri vien' : 'Nhan vien';
            document.getElementById('welcomeText').textContent = `${user.HOTEN || 'Nguoi dung'} • ${roleLabel}`;
            document.getElementById('roleBadge').innerHTML = `<i class="fa-solid fa-shield-halved"></i><span>${roleLabel}</span>`;
            document.getElementById('avatarText').textContent = String(user.HOTEN || 'U').trim().charAt(0).toUpperCase();
            if (role !== 'admin') {
                document.querySelectorAll('a.menu-item[href="/employees.html"]').forEach((el) => {
                    el.style.display = 'none';
                });
            }

            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('refreshBtn').addEventListener('click', function () {
                loadOrders().catch((err) => alert('Khong tai duoc danh sach don: ' + err.message));
            });
            document.getElementById('searchInput').addEventListener('input', renderOrdersTable);
            document.getElementById('statusFilter').addEventListener('change', renderOrdersTable);
            document.getElementById('customerFilter').addEventListener('change', renderOrdersTable);

            loadOrders().catch((err) => alert('Khong tai duoc danh sach don: ' + err.message));
        })();
    </script>
</body>
</html>
