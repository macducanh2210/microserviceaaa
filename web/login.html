<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - UTTMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f9fa, #eef2f7);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-card {
            max-width: 460px;
            border: 0;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        .brand {
            letter-spacing: 1px;
        }
        .btn-main {
            background: #1a1a1a;
            color: #fff;
            border: none;
        }
        .btn-main:hover {
            background: #ff3300;
            color: #fff;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
    <div class="card auth-card w-100">
        <div class="card-body p-4 p-md-5">
            <h3 class="fw-bold text-center mb-1 brand">UTT<span style="color:#ff3300">MART</span></h3>
            <p class="text-center text-muted mb-4" id="modeLabel">Đăng nhập để tiếp tục mua sắm</p>

            <div id="registerNameGroup" class="mb-3 d-none">
                <label class="form-label">Họ và tên</label>
                <input type="text" id="fullName" class="form-control" placeholder="Nguyễn Văn A">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com">
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">
            </div>

            <button id="submitBtn" class="btn btn-main w-100 py-2 mb-3">Đăng Nhập</button>
            <button id="switchBtn" class="btn btn-outline-secondary w-100 py-2">Chưa có tài khoản? Đăng ký</button>

            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none">Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <script>
        const USER_API_BASE = '/api/users';
        let isLoginMode = true;

        const modeLabel = document.getElementById('modeLabel');
        const registerNameGroup = document.getElementById('registerNameGroup');
        const submitBtn = document.getElementById('submitBtn');
        const switchBtn = document.getElementById('switchBtn');

        function renderMode() {
            if (isLoginMode) {
                modeLabel.textContent = 'Đăng nhập để tiếp tục mua sắm';
                registerNameGroup.classList.add('d-none');
                submitBtn.textContent = 'Đăng Nhập';
                switchBtn.textContent = 'Chưa có tài khoản? Đăng ký';
            } else {
                modeLabel.textContent = 'Tạo tài khoản mới';
                registerNameGroup.classList.remove('d-none');
                submitBtn.textContent = 'Đăng Ký';
                switchBtn.textContent = 'Đã có tài khoản? Đăng nhập';
            }
        }

        switchBtn.addEventListener('click', function () {
            isLoginMode = !isLoginMode;
            renderMode();
        });

        submitBtn.addEventListener('click', async function () {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();

            if (!email || !password || (!isLoginMode && !fullName)) {
                alert('Vui lòng nhập đầy đủ thông tin.');
                return;
            }

            const endpoint = isLoginMode ? `${USER_API_BASE}/login.php` : `${USER_API_BASE}/register.php`;
            const payload = isLoginMode
                ? { email, password }
                : { full_name: fullName, email, password };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (data.success !== true) {
                    alert(data.message || 'Thao tác thất bại');
                    return;
                }

                if (!isLoginMode) {
                    alert('Đăng ký thành công! Vui lòng đăng nhập.');
                    isLoginMode = true;
                    renderMode();
                    return;
                }

                localStorage.setItem('fashion_user_id', String(data.data.user_id));
                const role = String(data.data.role || 'customer').toLowerCase();
                localStorage.setItem('polymart_user', JSON.stringify({
                    ID: data.data.user_id,
                    HOTEN: data.data.full_name,
                    EMAIL: data.data.email,
                    ROLE: role,
                    CHUCVU: data.data.position_raw || 'USER'
                }));

                if (role === 'admin' || role === 'staff') {
                    window.location.href = '/manage.html';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                alert('Không kết nối được đến máy chủ.');
            }
        });

        renderMode();
    </script>
</body>
</html>
