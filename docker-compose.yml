services:
  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_service
      MYSQL_PASSWORD: user_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/user_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  product-db:
    image: mysql:8.0
    container_name: product-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_service
      MYSQL_PASSWORD: product_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/product_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  order-db:
    image: mysql:8.0
    container_name: order-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_service
      MYSQL_PASSWORD: order_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/order_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  user-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./services/user-service:/var/www/html
    environment:
      DB_HOST: user-db
      DB_PORT: 3306
      DB_NAME: user_db
      DB_USER: user_service
      DB_PASSWORD: user_pass
    depends_on:
      - user-db
    networks:
      - fashion-net

  product-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./services/product-service:/var/www/html
    environment:
      DB_HOST: product-db
      DB_PORT: 3306
      DB_NAME: product_db
      DB_USER: product_service
      DB_PASSWORD: product_pass
      INTERNAL_API_KEY: polymart-internal-key
    depends_on:
      - product-db
    networks:
      - fashion-net

  order-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./services/order-service:/var/www/html
    environment:
      DB_HOST: order-db
      DB_PORT: 3306
      DB_NAME: order_db
      DB_USER: order_service
      DB_PASSWORD: order_pass
      INTERNAL_API_KEY: polymart-internal-key
    depends_on:
      - order-db
    networks:
      - fashion-net

  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: inventory_service
      MYSQL_PASSWORD: inventory_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/inventory_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  inventory-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ./services/inventory-service:/var/www/html
    environment:
      DB_HOST: inventory-db
      DB_PORT: 3306
      DB_NAME: inventory_db
      DB_USER: inventory_service
      DB_PASSWORD: inventory_pass
      INTERNAL_API_KEY: polymart-internal-key
    depends_on:
      - inventory-db
    networks:
      - fashion-net

  employee-db:
    image: mysql:8.0
    container_name: employee-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
      MYSQL_USER: employee_service
      MYSQL_PASSWORD: employee_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/employee_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  employee-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: employee-service
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./services/employee-service:/var/www/html
    environment:
      DB_HOST: employee-db
      DB_PORT: 3306
      DB_NAME: employee_db
      DB_USER: employee_service
      DB_PASSWORD: employee_pass
      INTERNAL_API_KEY: polymart-internal-key
    depends_on:
      - employee-db
    networks:
      - fashion-net

  attendance-db:
    image: mysql:8.0
    container_name: attendance-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: attendance_service
      MYSQL_PASSWORD: attendance_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/attendance_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  attendance-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: attendance-service
    restart: unless-stopped
    ports:
      - "8086:80"
    volumes:
      - ./services/attendance-service:/var/www/html
    environment:
      DB_HOST: attendance-db
      DB_PORT: 3306
      DB_NAME: attendance_db
      DB_USER: attendance_service
      DB_PASSWORD: attendance_pass
      USER_EMPLOYEE_API: http://user-service/api/users/employees/get-all.php
    depends_on:
      - attendance-db
      - user-service
    networks:
      - fashion-net

  expense-db:
    image: mysql:8.0
    container_name: expense-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expense_db
      MYSQL_USER: expense_service
      MYSQL_PASSWORD: expense_pass
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./databases/expense_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fashion-net

  expense-service:
    build:
      context: .
      dockerfile: infra/php-apache/Dockerfile
    container_name: expense-service
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - ./services/expense-service:/var/www/html
    environment:
      DB_HOST: expense-db
      DB_PORT: 3306
      DB_NAME: expense_db
      DB_USER: expense_service
      DB_PASSWORD: expense_pass
      INTERNAL_API_KEY: polymart-internal-key
    depends_on:
      - expense-db
    networks:
      - fashion-net

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service
      - employee-service
      - attendance-service
      - expense-service
    networks:
      - fashion-net

networks:
  fashion-net:
    driver: bridge
