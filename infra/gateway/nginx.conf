server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/users {
        return 301 /api/users/;
    }

    location ~ ^/api/users/(.*)$ {
        proxy_set_header Host user-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/users/(.*)$ /api/users/$1 break;
        proxy_pass http://user-service;
    }

    location = /api/products {
        return 301 /api/products/;
    }

    location ~ ^/api/products/(.*)$ {
        proxy_set_header Host product-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/products/(.*)$ /api/products/$1 break;
        proxy_pass http://product-service;
    }

    location = /api/orders {
        return 301 /api/orders/;
    }

    location ~ ^/api/orders/(.*)$ {
        proxy_set_header Host order-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/orders/(.*)$ /api/orders/$1 break;
        proxy_pass http://order-service;
    }

    location = /api/inventory {
        return 301 /api/inventory/;
    }

    location ~ ^/api/inventory/(.*)$ {
        proxy_set_header Host inventory-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/inventory/(.*)$ /api/inventory/$1 break;
        proxy_pass http://inventory-service;
    }

    location = /api/employees {
        return 301 /api/employees/;
    }

    location ~ ^/api/employees/(.*)$ {
        proxy_set_header Host employee-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/employees/(.*)$ /api/employees/$1 break;
        proxy_pass http://employee-service;
    }

    location = /api/attendance {
        return 301 /api/attendance/;
    }

    location ~ ^/api/attendance/(.*)$ {
        proxy_set_header Host attendance-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/attendance/(.*)$ /api/attendance/$1 break;
        proxy_pass http://attendance-service;
    }

    location = /api/expenses {
        return 301 /api/expenses/;
    }

    location ~ ^/api/expenses/(.*)$ {
        proxy_set_header Host expense-service;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/expenses/(.*)$ /api/expenses/$1 break;
        proxy_pass http://expense-service;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
